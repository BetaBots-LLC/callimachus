name: Build & Release

# Triggered by the vX.Y.Z (or -rc.N) tag pushed by version.yml — or run manually.
# Builds the desktop app for macOS (Apple Silicon + Intel, each on its NATIVE
# runner), Windows (x64) and Linux (x64), signs the updater artifacts, and
# publishes them to one GitHub Release. RC/beta tags are marked prereleases.
# v[0-9]* matches desktop tags, not the vscode-v* extension tag.
#
# Why native per-arch macs (NOT --target universal): `ort` (fastembed's ONNX
# backend) ships no prebuilt for a cross-compiled x86_64-apple-darwin, so a
# universal build fails on the Intel slice. Building each arch on its own runner
# avoids the cross-compile. Linux runs on 24.04 because the ONNX prebuilt needs
# glibc >= 2.38 (22.04 ships 2.35 -> undefined __isoc23_* link errors).

on:
  push:
    tags: ["v[0-9]*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (native arm64)
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: macos-15-intel    # Intel (native x86_64 — macos-13 retired Dec 2025)
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-24.04      # Linux x64 (glibc 2.39 for the ONNX prebuilt)
            args: ""
            rust_target: ""
          - platform: windows-latest    # Windows x64
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install Linux build deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential pkg-config libssl-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target
          key: ${{ matrix.platform }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Callimachus ${{ inputs.tag || github.ref_name }}"
          releaseDraft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-rc') || contains(inputs.tag || github.ref_name, '-beta') }}
          # Each job appends its platform/arch entry to the release's latest.json.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
