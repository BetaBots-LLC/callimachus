name: Build & Release

# Triggered by the vX.Y.Z (or -rc.N) tag pushed by version.yml — or run manually.
# Builds the desktop app for macOS (Apple Silicon), Windows (x64) and Linux (x64),
# signs the updater artifacts, and publishes them to one GitHub Release. RC/beta
# tags are marked prereleases. v[0-9]* matches desktop tags, not the vscode-v* tag.
#
# macOS is Apple Silicon only: `ort` (fastembed's ONNX backend, currently pinned
# via fastembed to ort 2.0.0-rc.12) publishes NO x86_64-apple-darwin prebuilt at
# all — not even on a native Intel runner — and fastembed force-enables
# `download-binaries`, so there's no config knob to point it elsewhere. Supporting
# Intel would require a system/dynamic ONNX Runtime + bundling its dylib; not worth
# it for the shrinking Intel-Mac base. Linux runs on 24.04 because the ONNX prebuilt
# needs glibc >= 2.38 (22.04 ships 2.35 -> undefined __isoc23_* link errors).

on:
  push:
    tags: ["v[0-9]*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (native arm64)
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: ubuntu-24.04      # Linux x64 (glibc 2.39 for the ONNX prebuilt)
            args: ""
            rust_target: ""
          - platform: windows-latest    # Windows x64
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.platform }}
    env:
      # AppImage GPG signing (Linux). Empty until you add the secret → AppImage is
      # built unsigned, no failure. Gates the import step + the SIGN env below.
      LINUX_GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
      # Windows Authenticode via Azure Trusted Signing. Empty until you add the
      # AZURE_CLIENT_ID secret → gates the trusted-signing-cli install. The
      # signCommand (tauri.conf.json) only runs on the Windows leg.
      AZURE_SIGN: ${{ secrets.AZURE_CLIENT_ID }}
      # Apple notarization via App Store Connect API key. Empty until you add the
      # secret → the mac app is signed but not notarized (no failure). Gates the
      # .p8 write step below.
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install Linux build deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential pkg-config libssl-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # macOS: rustc links `-lclang_rt.osx` but searches a clang-version subdir the runner's
      # Xcode lacks; the lib is present under a different clang/<ver> dir. Add it to the search
      # path so the link resolves on macos-latest (see ci.yml for the full note).
      - name: Locate compiler-rt for the linker (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          LIB=$(find "$(xcode-select -p)" -name 'libclang_rt.osx.a' 2>/dev/null | head -1)
          if [ -n "$LIB" ]; then
            echo "RUSTFLAGS=${RUSTFLAGS:-} -L $(dirname "$LIB")" >> "$GITHUB_ENV"
            echo "compiler-rt: $LIB"
          else
            echo "::warning::libclang_rt.osx.a not found under $(xcode-select -p)"
          fi

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target
          key: ${{ matrix.platform }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import AppImage signing key (Linux)
        if: startsWith(matrix.platform, 'ubuntu') && env.LINUX_GPG_PRIVATE_KEY != ''
        run: echo "$LINUX_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Install Trusted Signing CLI (Windows)
        if: matrix.platform == 'windows-latest' && env.AZURE_SIGN != ''
        run: cargo install trusted-signing-cli --locked

      # Decode the App Store Connect API key (.p8) used for notarization. The base64
      # secret avoids storing a file; the path is handed to the Tauri bundler below
      # via APPLE_API_KEY_PATH. macOS leg only, and only when the secret is set.
      - name: Write App Store Connect API key (macOS)
        if: startsWith(matrix.platform, 'macos') && env.APPLE_API_KEY != ''
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/apple_api_key.p8"

      - name: Build, sign & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # AppImage GPG signing — Linux only, and only when the key secret exists
          # (otherwise SIGN is empty → unsigned AppImage, no failure).
          SIGN: ${{ startsWith(matrix.platform, 'ubuntu') && env.LINUX_GPG_PRIVATE_KEY != '' && '1' || '' }}
          SIGN_KEY: ${{ secrets.LINUX_GPG_KEY_ID }}
          APPIMAGETOOL_SIGN_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
          APPIMAGETOOL_FORCE_SIGN: ${{ startsWith(matrix.platform, 'ubuntu') && env.LINUX_GPG_PRIVATE_KEY != '' && '1' || '' }}
          # Azure Trusted Signing creds — read by trusted-signing-cli (the Windows
          # signCommand in tauri.conf.json). Unused/harmless on macOS & Linux legs.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # Apple Developer ID signing + notarization — macOS leg only. Empty until
          # you add the secrets → the mac app builds unsigned (no failure), same as
          # the Azure/GPG legs. The Tauri bundler decodes APPLE_CERTIFICATE into a
          # temporary keychain itself, so no manual `security` step is needed. The
          # ONNX runtime is statically linked (ort download-binaries), so there's no
          # nested third-party dylib and no entitlements file is required. Hardened
          # runtime is on by default; with no App Sandbox it does not block the git/
          # osascript/CLI subprocesses the app spawns. Notarization + stapling run
          # via the App Store Connect API key (APPLE_API_KEY/ISSUER/KEY_PATH) — far
          # more robust than an Apple ID + app-specific password, which locks the
          # account after repeated failed CI auths. Harmless on Windows & Linux legs.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple_api_key.p8
        with:
          projectPath: apps/desktop
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Callimachus ${{ inputs.tag || github.ref_name }}"
          releaseDraft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-rc') || contains(inputs.tag || github.ref_name, '-beta') }}
          # Each job appends its platform/arch entry to the release's latest.json.
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # Standalone `cal` + `callimachus-mcp` binaries for CLI/MCP-only users (no GUI
      # app). Reuses the rust-cache from the app build, so it's a near-incremental
      # compile. Each job uploads its own arch-suffixed names → no collisions; the
      # tauri-action above already created/updated the release we attach to.
      - name: Build & upload standalone cal + callimachus-mcp
        shell: bash
        working-directory: apps/desktop/src-tauri
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          TARGET="${{ matrix.rust_target }}"
          if [ -n "$TARGET" ]; then
            cargo build --release --target "$TARGET" --bin cal --bin callimachus-mcp
            OUT="target/$TARGET/release"
            TRIPLE="$TARGET"
          else
            cargo build --release --bin cal --bin callimachus-mcp
            OUT="target/release"
            TRIPLE="$(rustc -vV | sed -n 's/host: //p')"
          fi
          EXT=""
          [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"
          STAGE="$RUNNER_TEMP/cli-bins"
          mkdir -p "$STAGE"
          cp "$OUT/cal$EXT"             "$STAGE/cal-$TRIPLE$EXT"
          cp "$OUT/callimachus-mcp$EXT" "$STAGE/callimachus-mcp-$TRIPLE$EXT"
          gh release upload "$TAG" \
            "$STAGE/cal-$TRIPLE$EXT" \
            "$STAGE/callimachus-mcp-$TRIPLE$EXT" \
            --clobber

  # Once every platform's binaries are attached to the Release, publish the
  # `callimachus-mcp` npm wrapper (it downloads those binaries at runtime) and
  # refresh the entry on the official MCP registry. Runs once, after the matrix.
  # Skipped on prereleases and when NPM_TOKEN isn't set, so it's inert until you
  # add that secret. Registry auth is GitHub OIDC (no secret) and needs
  # `id-token: write`; the namespace `io.github.betabots-llc/*` is verified
  # against this repo's owning org.
  publish-mcp:
    name: Publish npm wrapper + MCP registry
    needs: release
    if: ${{ !contains(inputs.tag || github.ref_name, '-rc') && !contains(inputs.tag || github.ref_name, '-beta') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      HAS_NPM: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish wrapper to npm
        if: env.HAS_NPM == 'true'
        working-directory: packages/callimachus-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Install mcp-publisher
        if: env.HAS_NPM == 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP registry (GitHub OIDC)
        if: env.HAS_NPM == 'true'
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
