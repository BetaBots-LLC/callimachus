name: Build & Release

# Triggered by the vX.Y.Z (or -rc.N) tag pushed by version.yml — or run manually.
# Builds the desktop app for macOS (Apple Silicon), Windows (x64) and Linux (x64),
# signs the updater artifacts, and publishes them to one GitHub Release. RC/beta
# tags are marked prereleases. v[0-9]* matches desktop tags, not the vscode-v* tag.
#
# macOS is Apple Silicon only: `ort` (fastembed's ONNX backend, currently pinned
# via fastembed to ort 2.0.0-rc.12) publishes NO x86_64-apple-darwin prebuilt at
# all — not even on a native Intel runner — and fastembed force-enables
# `download-binaries`, so there's no config knob to point it elsewhere. Supporting
# Intel would require a system/dynamic ONNX Runtime + bundling its dylib; not worth
# it for the shrinking Intel-Mac base. Linux runs on 24.04 because the ONNX prebuilt
# needs glibc >= 2.38 (22.04 ships 2.35 -> undefined __isoc23_* link errors).

on:
  push:
    tags: ["v[0-9]*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (native arm64)
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: ubuntu-24.04      # Linux x64 (glibc 2.39 for the ONNX prebuilt)
            args: ""
            rust_target: ""
          - platform: windows-latest    # Windows x64
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.platform }}
    env:
      # AppImage GPG signing (Linux). Empty until you add the secret → AppImage is
      # built unsigned, no failure. Gates the import step + the SIGN env below.
      LINUX_GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install Linux build deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential pkg-config libssl-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target
          key: ${{ matrix.platform }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import AppImage signing key (Linux)
        if: startsWith(matrix.platform, 'ubuntu') && env.LINUX_GPG_PRIVATE_KEY != ''
        run: echo "$LINUX_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Build, sign & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # AppImage GPG signing — Linux only, and only when the key secret exists
          # (otherwise SIGN is empty → unsigned AppImage, no failure).
          SIGN: ${{ startsWith(matrix.platform, 'ubuntu') && env.LINUX_GPG_PRIVATE_KEY != '' && '1' || '' }}
          SIGN_KEY: ${{ secrets.LINUX_GPG_KEY_ID }}
          APPIMAGETOOL_SIGN_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
          APPIMAGETOOL_FORCE_SIGN: ${{ startsWith(matrix.platform, 'ubuntu') && env.LINUX_GPG_PRIVATE_KEY != '' && '1' || '' }}
        with:
          projectPath: apps/desktop
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Callimachus ${{ inputs.tag || github.ref_name }}"
          releaseDraft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-rc') || contains(inputs.tag || github.ref_name, '-beta') }}
          # Each job appends its platform/arch entry to the release's latest.json.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
