name: Build & Release

# Triggered by the vX.Y.Z (or -rc.N) tag pushed by version.yml — or run manually.
# Builds the desktop app for macOS (universal), Windows (x64) and Linux (x64),
# signs the updater artifacts, and publishes them to one GitHub Release. RC/beta
# tags are marked prereleases so they never become the "latest" the stable
# updater points at. v[0-9]* matches desktop tags, not the vscode-v* extension tag.

on:
  push:
    tags: ["v[0-9]*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.2.0-rc.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # universal (Apple Silicon + Intel)
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04      # Linux x64 (.AppImage + .deb)
            args: ""
          - platform: windows-latest    # Windows x64 (.msi + .exe)
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential pkg-config libssl-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target
          key: ${{ matrix.platform }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Callimachus ${{ inputs.tag || github.ref_name }}"
          releaseDraft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-rc') || contains(inputs.tag || github.ref_name, '-beta') }}
          # Each matrix job appends its platform's entry to the release's latest.json.
          uploadUpdaterJson: true
          args: ${{ matrix.args }}
