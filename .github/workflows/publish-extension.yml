name: Publish Extension

# Runs on the SAME vX.Y.Z tag as the desktop build (one tag drives both; the
# extension version mirrors the desktop version). Packages the VS Code / Cursor
# extension, publishes it to the VS Code Marketplace and Open VSX (where Cursor &
# VSCodium install from), and attaches the .vsix to the SAME GitHub Release as the
# desktop installers. Marketplace publish is skipped when its token is absent.

on:
  push:
    tags: ["v[0-9]*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish the extension for (e.g. v0.4.1)"
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip on RC/beta tags — the Marketplace doesn't accept prerelease versions
    # (e.g. 0.4.1-rc.1), and there's no prerelease channel for the extension.
    if: ${{ !contains(inputs.tag || github.ref_name, '-rc') && !contains(inputs.tag || github.ref_name, '-beta') }}
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package extension (.vsix)
        working-directory: apps/vscode
        run: pnpm run package

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        working-directory: apps/vscode
        run: pnpm exec vsce publish --packagePath callimachus-vscode.vsix -p "$VSCE_PAT"

      - name: Publish to Open VSX (Cursor / VSCodium)
        if: env.OVSX_PAT != ''
        working-directory: apps/vscode
        run: |
          # Namespace must exist before the first publish; no-op if already created.
          pnpm exec ovsx create-namespace BetaBotsLLC -p "$OVSX_PAT" || true
          pnpm exec ovsx publish callimachus-vscode.vsix -p "$OVSX_PAT"

      - name: Attach .vsix to the release
        uses: softprops/action-gh-release@v2
        with:
          # Same tag as the desktop build → appends the .vsix to that release.
          # No name/body here so build.yml owns the release title.
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: apps/vscode/callimachus-vscode.vsix
