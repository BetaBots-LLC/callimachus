name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Lint/typecheck/test on macOS (Apple Silicon, per Tauri's recommended pipeline).
    # Stays on macos-latest because our HTTP stack is native-tls, NOT rustls (see Cargo.toml).
    # rustls drags in aws-lc-sys, which needs libclang_rt.osx.a — absent in recent macos-latest
    # Xcodes — and that's what used to break linking ("ld: library 'clang_rt.osx' not found").
    # KEEP the TLS stack native (no rustls/aws-lc-sys) or this breaks on macos-latest again.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build frontend
        run: pnpm turbo run typecheck build lint

      - name: Rust fmt
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: Rust tests
        working-directory: apps/desktop/src-tauri
        run: cargo test
