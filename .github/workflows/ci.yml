name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Lint/typecheck/test on macOS (Apple Silicon, per Tauri's recommended pipeline).
    # Cross-platform compilation is exercised by the release matrix in build.yml on every tag.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target
          # Bump when the runner's toolchain changes: a cached build-script search path to the
          # clang resource dir (e.g. .../clang/17/lib/darwin) goes stale after a macOS image
          # update and breaks linking ("ld: library 'clang_rt.osx' not found"). This forces a
          # clean rebuild against the current Xcode.
          prefix-key: "v1-clangrt"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build frontend
        run: pnpm turbo run typecheck build lint

      - name: Rust fmt
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: Rust tests
        working-directory: apps/desktop/src-tauri
        run: cargo test
