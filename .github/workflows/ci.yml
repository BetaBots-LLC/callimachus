name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Lint/typecheck/test on macOS (Apple Silicon). Cross-platform compilation
    # (Windows + Linux) is exercised by the release matrix in build.yml on every tag.
    # Pinned to macos-14 (Xcode 15.4): the macos-latest image (Xcode 16.4) is missing
    # libclang_rt.osx.a at the path rustc links against, so the test binary fails to link
    # ("ld: library 'clang_rt.osx' not found"). Revisit when the macos-latest image is fixed.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build frontend
        run: pnpm turbo run typecheck build lint

      - name: Rust fmt
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: Rust tests
        working-directory: apps/desktop/src-tauri
        run: cargo test
