name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # Lint/typecheck/test on macOS (Apple Silicon, per Tauri's recommended pipeline).
    # Cross-platform compilation is exercised by the release matrix in build.yml on every tag.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # rustc links `-lclang_rt.osx` but searches a clang-version subdir the current macos-latest
      # Xcode doesn't have, so the link fails ("ld: library 'clang_rt.osx' not found"). The lib
      # IS on the runner, just under a different clang/<ver> dir — find it and add it to the
      # linker search path. (Not a dependency issue; it's where the active Xcode put compiler-rt.)
      - name: Locate compiler-rt for the linker
        run: |
          LIB=$(find "$(xcode-select -p)" -name 'libclang_rt.osx.a' 2>/dev/null | head -1)
          if [ -n "$LIB" ]; then
            echo "RUSTFLAGS=${RUSTFLAGS:-} -L $(dirname "$LIB")" >> "$GITHUB_ENV"
            echo "compiler-rt: $LIB"
          else
            echo "::warning::libclang_rt.osx.a not found under $(xcode-select -p)"
          fi

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck + build frontend
        run: pnpm turbo run typecheck build lint

      - name: Rust fmt
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: Rust tests
        working-directory: apps/desktop/src-tauri
        run: cargo test
